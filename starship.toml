# 1. IMPOSTAZIONI GLOBALI (Devono stare ASSOLUTAMENTE in cima)
add_newline = false
palette = "catppuccin_mocha"


# 3. FORMATO DEL PROMPT (Identico al tuo ZSH)
format = '''
[╭─ ](text)[$username](green)[@](text)[$hostname](text)[ $directory](green)
[╰─](text)[$git_branch](green)[$git_status](green)[> ](green)'''

# 4. CONFIGURAZIONE MODULI
[username]
show_always = true
style_user = "green"
# Forziamo il formato per mostrare solo l'utente, senza testo aggiuntivo
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "text"
# Forziamo il formato per mostrare solo l'hostname
format = "[$hostname]($style)"

[directory]
style = "green"
truncate_to_repo = false

[git_branch]
symbol = " "
style = "green"
format = "[$symbol$branch ]($style)"

[git_status]
style = "green"
format = '([\[$all_status$ahead_behind\]]($style) )'

